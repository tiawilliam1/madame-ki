    <dialog class="tops-lightbox" id="tops-lightbox" aria-label="Fullscreen category image">
      <button class="tops-lightbox-close" type="button">Close</button>
      <img class="tops-lightbox-image" src="" alt="" />
    </dialog>

    <script>
      const yearEl = document.getElementById('year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();
      (function(){
        const lightbox = document.getElementById("tops-lightbox");
        if (!lightbox) return;
        const lightboxImage = lightbox.querySelector(".tops-lightbox-image");
        const closeButton = lightbox.querySelector(".tops-lightbox-close");
        const triggers = document.querySelectorAll(".tops-lightbox-trigger");
        triggers.forEach((trigger) => {
          trigger.addEventListener("click", () => {
            lightboxImage.src = trigger.dataset.fullscreenSrc;
            lightboxImage.alt = trigger.dataset.fullscreenAlt || "";
            lightbox.showModal();
          });
        });
        closeButton.addEventListener("click", () => lightbox.close());
        lightbox.addEventListener("click", (event) => {
          if (event.target === lightbox) lightbox.close();
        });
        lightbox.addEventListener("close", () => {
          lightboxImage.removeAttribute("src");
          lightboxImage.alt = "";
        });
      })();
    </script>
