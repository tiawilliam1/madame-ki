<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MAdAME KI Color Palette</title>
    <style>
      *{box-sizing:border-box}
      body{
        margin:0;
        min-height:100vh;
        background:#f8f6f2;
        color:#0b0b0b;
        font-family:Georgia,"Times New Roman",serif;
      }
      main{
        width:min(1180px, calc(100% - 64px));
        margin:0 auto;
        padding:64px 0;
      }
      h1{
        margin:0 0 42px;
        font-family:"Iowan Old Style","Palatino Linotype","Times New Roman",serif;
        font-size:clamp(42px, 5vw, 76px);
        font-weight:600;
        line-height:0.92;
        letter-spacing:0;
        text-transform:uppercase;
        text-align:center;
      }
      .palette{
        display:grid;
        grid-template-columns:repeat(3, minmax(0, 1fr));
        gap:20px;
      }
      .color{
        background:#ffffff;
        border:1px solid rgba(11,11,11,0.12);
        box-shadow:0 12px 30px rgba(11,11,11,0.06);
      }
      .swatch{
        height:190px;
        border-bottom:1px solid rgba(11,11,11,0.12);
      }
      .info{
        padding:22px;
        text-align:center;
      }
      .name{
        margin:0 0 10px;
        font-size:14px;
        font-weight:700;
        letter-spacing:1.8px;
        text-transform:uppercase;
      }
      .hex{
        margin:0;
        color:#d92b45;
        font-size:18px;
        letter-spacing:1.2px;
        text-transform:uppercase;
      }
      @media(max-width:760px){
        main{width:calc(100% - 36px);padding:40px 0}
        .palette{grid-template-columns:1fr}
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MAdAME KI<br>Color Palette</h1>
      <section class="palette" aria-label="Main color palette">
        <article class="color">
          <div class="swatch" style="background:#d92b45"></div>
          <div class="info">
            <p class="name">Signature Red</p>
            <p class="hex">#D92B45</p>
          </div>
        </article>
        <article class="color">
          <div class="swatch" style="background:#0b0b0b"></div>
          <div class="info">
            <p class="name">Ink Black</p>
            <p class="hex">#0B0B0B</p>
          </div>
        </article>
        <article class="color">
          <div class="swatch" style="background:#ffffff"></div>
          <div class="info">
            <p class="name">Pure White</p>
            <p class="hex">#FFFFFF</p>
          </div>
        </article>
        <article class="color">
          <div class="swatch" style="background:#f8f6f2"></div>
          <div class="info">
            <p class="name">Warm Cream</p>
            <p class="hex">#F8F6F2</p>
          </div>
        </article>
        <article class="color">
          <div class="swatch" style="background:#f8f8f8"></div>
          <div class="info">
            <p class="name">Soft Gray</p>
            <p class="hex">#F8F8F8</p>
          </div>
        </article>
        <article class="color">
          <div class="swatch" style="background:#363636"></div>
          <div class="info">
            <p class="name">Charcoal</p>
            <p class="hex">#363636</p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
